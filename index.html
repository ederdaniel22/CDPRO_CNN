<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Detecção de Pneumonia</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
</head>
<body>
    <h1>Detecção de Pneumonia (TensorFlow.js)</h1>
    <input type="file" id="fileInput" accept="image/*">
    <div id="image-container">
        <img id="selectedImage" src="#" alt="Imagem selecionada" style="display:none; max-width:300px;">
    </div>
    <button id="predictButton" disabled>Detectar Pneumonia</button>
    <p id="prediction-result"></p>
    <script src="script.js"></script>
</body>
</html>
